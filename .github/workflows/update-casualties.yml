name: Update Casualties Data

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape casualty data
        run: node scripts/update-casualties.mjs

      - name: Check for changes
        id: check
        run: |
          git diff --quiet public/casualties.json src/components/ImpactTracker.jsx && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/casualties.json src/components/ImpactTracker.jsx
          git commit -m "chore: auto-update casualty figures $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
