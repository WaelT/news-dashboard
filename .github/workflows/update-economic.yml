name: Update Economic Impact Data

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape economic data
        run: node scripts/update-economic.mjs

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/components/MarketImpact.jsx && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/components/MarketImpact.jsx
          git commit -m "chore: auto-update economic impact data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
