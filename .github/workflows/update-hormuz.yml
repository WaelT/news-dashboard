name: Update Strait of Hormuz Data

on:
  schedule:
    - cron: '30 */6 * * *' # Every 6 hours, offset 30 min from casualties workflow
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Scrape Hormuz data
        run: node scripts/update-hormuz.mjs

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/data/hormuzData.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/hormuzData.js
          git commit -m "chore: auto-update Hormuz data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
